<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="overlay">
        <div class="intro-content">
            <span class="heart-icon">❤️</span>
            <h1>Click to start the journey</h1>
            <p>(please turn on your audio)</p>
        </div>
    </div>

    <div id="terminal-screen" class="hidden">
        <div id="terminal-text"></div>
    </div>

    <div id="content-box" class="hidden">
        <h1 id="main-text"></h1>
        <p id="sub-text"></p>
        <div id="status-bar">
            Signal: <span id="signal-strength">Stable</span> |
            Status: <span id="checklist">✓</span>
        </div>
    </div>

    <div id="floating-container"></div>

    <div id="reboot-modal" class="hidden">
        <div class="modal-content">
            <h3 style="color: red;">CRITICAL ERROR</h3>
            <p>Persistent memory leak detected in module 'Feelings'.<br>Action Required: Reboot system and clear temporary data?</p>
            <div class="btn-group">
                <button id="btn-yes">YES</button>
                <button id="btn-no">NO</button>
            </div>
        </div>
    </div>

    <div id="final-heart" class="hidden">💔</div>

    <script src="script.js"></script>
    
</body>
</html>
