<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Support System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="overlay">
        <div class="intro-content">
            <span class="heart-icon">❤️</span>
            <h1 style="font-size: 1.5rem;">Click anywhere to start the journey</h1>
            <p style="color: #ff4d4d; font-size: 0.9rem;">(please turn on your audio)</p>
        </div>
    </div>

    <div id="terminal-screen" class="hidden">
        <div id="terminal-text"></div>
    </div>

    <div id="content-box" class="hidden">
        <h1 id="main-text"></h1>
        <p id="sub-text"></p>
        <div id="status-bar">
            Signal: <span id="signal-strength">Stable</span> |
            Status: <span id="checklist">✓</span>
        </div>
    </div>

    <div id="floating-container"></div>

    <div id="reboot-modal" class="hidden">
        <div id="modal-inner" class="modal-content">
            <h3 style="color: #ff0000; margin-bottom: 15px;">CRITICAL ERROR</h3>
            <p>Persistent memory leak detected in module 'Feelings'.<br><br>Action Required: Reboot system and clear temporary data?</p>
            <div class="btn-group">
                <button id="btn-yes">YES</button>
                <button id="btn-no">NO</button>
            </div>
        </div>
    </div>

    <div id="final-heart">❤️</div>

    <script src="script.js"></script>
    
</body>
</html>
